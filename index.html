<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dynamic Website</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <img id="profile-pic" class="profile-img" src="" alt="Profile Picture">
    <h1 id="main-headline">Loading...</h1>
    <p id="about-me"></p>
  </div>

  <script>
    // This script fetches the data from homepage.json and injects it into the HTML
    fetch('./data/homepage.json')
      .then(response => response.json())
      .then(data => {
        document.getElementById('main-headline').innerText = data.headline;
        document.getElementById('about-me').innerText = data.about_text;
        document.getElementById('profile-pic').src = data.profile_image;
      })
      .catch(error => console.error('Error loading content:', error));
  </script>

</body>
</html>
